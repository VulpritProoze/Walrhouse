on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

# Set up permissions for deploying with secretless Azure federated credentials
# https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure?tabs=azure-portal%2Clinux#set-up-azure-login-with-openid-connect-authentication
permissions:
  id-token: write
  contents: read

jobs:
  build:
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh

      - name: Prepare azd environment file
        run: |
          $envDir = Join-Path ".azure" "$Env:AZURE_ENV_NAME"
          New-Item -ItemType Directory -Path $envDir -Force | Out-Null
          $envFile = Join-Path $envDir ".env"

          @(
            "AZURE_ENV_NAME=$Env:AZURE_ENV_NAME"
            "AZURE_LOCATION=$Env:AZURE_LOCATION"
            "AZURE_SUBSCRIPTION_ID=$Env:AZURE_SUBSCRIPTION_ID"
            "AZURE_TENANT_ID=$Env:AZURE_TENANT_ID"
            "AZURE_CLIENT_ID=$Env:AZURE_CLIENT_ID"
            "AZURE_WALRHOUSE_DB=$Env:WalrhouseDb"
            "WalrhouseDb=$Env:WalrhouseDb"
            "AZURE_KEY_VAULT_ENDPOINT=$Env:AZURE_KEY_VAULT_ENDPOINT"
            "CookieExpiryDays=$Env:CookieExpiryDays"
            "SeedAdminEmail=$Env:SeedAdminEmail"
            "SeedAdminFirstName=$Env:SeedAdminFirstName"
            "SeedAdminLastName=$Env:SeedAdminLastName"
            "SeedAdminPassword=$Env:SeedAdminPassword"
          ) | Set-Content -Path $envFile -Encoding UTF8
        shell: pwsh

      - name: Provision Infrastructure
        run: azd provision --no-prompt --environment "$AZURE_ENV_NAME"

      - name: Deploy Application
        run: azd deploy --no-prompt --environment "$AZURE_ENV_NAME"
