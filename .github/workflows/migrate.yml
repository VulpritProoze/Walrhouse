name: Database Migrate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    name: Apply EF Core migrations
    runs-on: ubuntu-latest
    env:
      ConnectionStrings__WalrhouseDb: ${{ secrets.AZURE_WALRHOUSE_DB }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Validate required secret
        run: |
          if [ -z "${ConnectionStrings__WalrhouseDb}" ]; then
            echo "Missing required secret: AZURE_WALRHOUSE_DB"
            exit 1
          fi

      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef --version "10.*"
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh

      - name: Restore solution
        run: dotnet restore Walrhouse.slnx

      - name: Apply migrations
        run: >
          dotnet ef database update
          --project src/Walrhouse.Infrastructure/Walrhouse.Infrastructure.csproj
          --startup-project src/Walrhouse.Web/Walrhouse.Web.csproj
          --context ApplicationDbContext
          --verbose
