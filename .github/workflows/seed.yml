name: Seed Database

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  seed:
    name: Run Seed
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_KEY_VAULT_ENDPOINT: ${{ vars.AZURE_KEY_VAULT_ENDPOINT || secrets.AZURE_KEY_VAULT_ENDPOINT }}
      ConnectionStrings__WalrhouseDb: ${{ vars.WalrhouseDb || secrets.WalrhouseDb || secrets.AZURE_WALRHOUSE_DB }}
      SeedUsers__Administrator__Email: ${{ vars.SeedAdminEmail || secrets.SeedAdminEmail || secrets.SEED_ADMIN_EMAIL }}
      SeedUsers__Administrator__FirstName: ${{ vars.SeedAdminFirstName || secrets.SeedAdminFirstName || secrets.SEED_ADMIN_FIRST_NAME }}
      SeedUsers__Administrator__LastName: ${{ vars.SeedAdminLastName || secrets.SeedAdminLastName || secrets.SEED_ADMIN_LAST_NAME }}
      SeedUsers__Administrator__Password: ${{ vars.SeedAdminPassword || secrets.SeedAdminPassword || secrets.SEED_ADMIN_PASSWORD }}
      CookieExpiryDays: ${{ vars.CookieExpiryDays || secrets.COOKIE_EXPIRY_DAYS || secrets.CookieExpiryDays }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh

      - name: Run seeder (production-safe)
        run: |
          dotnet run --project src/Walrhouse.Web/Walrhouse.Web.csproj --configuration Release -- seed
