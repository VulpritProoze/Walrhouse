name: Client Linting

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: src/Walrhouse.Web/App/WebClient

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: src/Walrhouse.Web/App/WebClient/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: ESLint check
        run: npm run lint

      - name: TypeScript check
        run: npx tsc
