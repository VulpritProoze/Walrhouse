name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  client-lint:
    name: Client Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Walrhouse.Web/App/WebClient
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: src/Walrhouse.Web/App/WebClient/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: ESLint check
        run: npm run lint

      - name: TypeScript check
        run: npx tsc

  server-lint:
    name: Server Linting
    runs-on: ubuntu-latest
    needs: client-lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Dotnet build
        run: dotnet build --configuration Release

      - name: CSharpier check
        run: dotnet tool run csharpier -- --check .
